<nav th:fragment="navbar" class="navbar">
    <div class="nav-container">

        <div class="logo">
            <a th:href="@{/}">🎁 Wishlist</a>
        </div>

        <!-- Hamburger -->
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>

        <!-- Menu -->
        <ul class="nav-links" id="navLinks">
            <li><a th:href="@{/}">Home</a></li>
            <li><a th:href="@{/wishlists}">Wishlists</a></li>
            <li><a th:href="@{/products}">Products</a></li>

            <!-- Mobile auth -->
            <li class="mobile-only"><a th:href="@{/login}">Login</a></li>
            <li class="mobile-only"><a th:href="@{/register}">Register</a></li>
        </ul>

        <!-- Desktop auth -->
        <div class="auth-buttons">

            <!-- Logged in -->
            <div th:if="${session.user != null}">
                <span style="margin-right:10px;">
                    <span th:text="${session.user.username}"></span>
                </span>
                <a th:href="@{/logout}" class="btn login">Logout</a>
            </div>

            <!-- Not logged in -->
            <div th:if="${session.user == null}">
                <a th:href="@{/login}" class="btn login">Login</a>
                <a th:href="@{/register}" class="btn register">Register</a>
            </div>

        </div>

    </div>
</nav>
